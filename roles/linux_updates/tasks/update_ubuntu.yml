---

- name: Update the Ubuntu apt package index
  ansible.builtin.apt:
    update_cache: true
  changed_when: false

- name: Upgrade all Ubuntu packages to the latest version
  ansible.builtin.apt:
    upgrade: dist

- name: Remove unused Ubuntu packages
  ansible.builtin.apt:
    autoremove: true

- name: Ensure textfile collector directory exists for Linux update metrics
  ansible.builtin.file:
    path: "{{ linux_updates_textfile_collector_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Refresh Linux updates availability metrics after update run
  ansible.builtin.shell: |
    set -euo pipefail
    tmp_file="$(mktemp)"
    updates=$(apt list --upgradeable 2>/dev/null | awk '/upgradable/ { count++ } END { print count + 0 }')
    security_updates=$(apt list --upgradeable 2>/dev/null | awk '/security/ && /upgradable/ { count++ } END { print count + 0 }')
    cat > "$tmp_file" <<EOF
    linux_updates_available $updates
    linux_security_updates_available $security_updates
    EOF
    install -o root -g root -m 0644 "$tmp_file" "{{ linux_updates_metrics_path }}"
    rm -f "$tmp_file"
  args:
    executable: /bin/bash
  changed_when: true

- name: Record Linux update run timestamp metric
  ansible.builtin.copy:
    dest: "{{ linux_updates_last_run_metric_path }}"
    content: |
      linux_updates_last_run_timestamp_seconds {{ ansible_date_time.epoch }}
    owner: root
    group: root
    mode: "0644"

- name: Check if a restart is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: linux_updates_reboot_required

- name: Notify about reboot
  ansible.builtin.debug:
    msg: "Rebooting the target host in 60 seconds."

- name: Schedule reboot via cron
  ansible.builtin.cron:
    name: "temporary reboot trigger"
    user: root
    job: "shutdown -r now"
    minute: "{{ (ansible_date_time.minute | int + 1) % 60 }}"
    hour: "{{ (ansible_date_time.hour | int + ((ansible_date_time.minute | int == 59) | ternary(1,0))) % 24 }}"
  when: linux_updates_reboot_required is defined and linux_updates_reboot_required.stat.exists
