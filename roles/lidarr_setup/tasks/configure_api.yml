- name: Read deployed Lidarr config file
  no_log: true
  ansible.builtin.slurp:
    src: "{{ lidarr_setup_config_dir }}/config.xml"
  register: lidarr_setup_config_xml_response
  changed_when: false

- name: Resolve Lidarr API key from deployed config
  ansible.builtin.set_fact:
    lidarr_setup_resolved_api_key: >-
      {{
        (
          lidarr_setup_config_xml_response.content
          | b64decode
          | regex_search('<ApiKey>([^<]+)</ApiKey>', '\\1')
          | first
        )
      }}

- name: Fail when Lidarr API key cannot be resolved
  ansible.builtin.fail:
    msg: >-
      Unable to resolve the Lidarr API key from {{ lidarr_setup_config_dir
      }}/config.xml and no lidarr_setup_api_key fallback is defined.
  when: lidarr_setup_resolved_api_key | default('') | length == 0

- name: Wait for Lidarr API to become available
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/system/status"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_system_status_response
  retries: 30
  delay: 5
  until: lidarr_setup_system_status_response.status == 200
  changed_when: false

- name: Get Lidarr quality profiles
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/qualityprofile"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_quality_profiles_response
  when: lidarr_setup_root_folders | length > 0
  changed_when: false

- name: Get Lidarr metadata profiles
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/metadataprofile"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_metadata_profiles_response
  when: lidarr_setup_root_folders | length > 0
  changed_when: false

- name: Get existing Lidarr root folders
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/rootfolder"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_root_folders_response
  when: lidarr_setup_root_folders | length > 0
  changed_when: false

- name: Reconcile Lidarr root folders
  ansible.builtin.include_tasks: configure_root_folder.yml
  loop: "{{ lidarr_setup_root_folders }}"
  loop_control:
    loop_var: lidarr_root_folder
    label: "{{ lidarr_root_folder.path }}"
  when: lidarr_setup_root_folders | length > 0

- name: Get existing Lidarr download clients
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/downloadclient"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_download_clients_response
  when: (lidarr_setup_download_clients | length > 0) or (lidarr_setup_indexers |
    length > 0)
  changed_when: false

- name: Get Lidarr download client schema
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/downloadclient/schema"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_download_client_schema_response
  when: lidarr_setup_download_clients | length > 0
  changed_when: false

- name: Reconcile Lidarr download clients
  ansible.builtin.include_tasks: configure_provider_resource.yml
  loop: "{{ lidarr_setup_download_clients }}"
  loop_control:
    loop_var: lidarr_provider_item
    label: "{{ lidarr_provider_item.name }}"
  vars:
    lidarr_provider_type: downloadclient
    lidarr_provider_existing_items: "{{ lidarr_setup_download_clients_response.json }}"
    lidarr_provider_schema_items: "{{ lidarr_setup_download_client_schema_response.json }}"
  when: lidarr_setup_download_clients | length > 0

- name: Refresh Lidarr download clients after reconciliation
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/downloadclient"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_download_clients_response
  when: lidarr_setup_indexers | length > 0
  changed_when: false

- name: Get existing Lidarr indexers
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/indexer"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_indexers_response
  when: lidarr_setup_indexers | length > 0
  changed_when: false

- name: Get Lidarr indexer schema
  ansible.builtin.uri:
    url: "{{ lidarr_setup_api_url }}/api/v1/indexer/schema"
    method: GET
    headers:
      X-Api-Key: "{{ lidarr_setup_resolved_api_key }}"
    validate_certs: "{{ lidarr_setup_api_validate_certs }}"
    status_code: 200
  register: lidarr_setup_indexer_schema_response
  when: lidarr_setup_indexers | length > 0
  changed_when: false

- name: Reconcile Lidarr indexers
  ansible.builtin.include_tasks: configure_provider_resource.yml
  loop: "{{ lidarr_setup_indexers }}"
  loop_control:
    loop_var: lidarr_provider_item
    label: "{{ lidarr_provider_item.name }}"
  vars:
    lidarr_provider_type: indexer
    lidarr_provider_existing_items: "{{ lidarr_setup_indexers_response.json }}"
    lidarr_provider_schema_items: "{{ lidarr_setup_indexer_schema_response.json }}"
  when: lidarr_setup_indexers | length > 0
