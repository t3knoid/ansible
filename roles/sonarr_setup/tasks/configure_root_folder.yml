- name: Find existing Sonarr root folder
  ansible.builtin.set_fact:
    sonarr_setup_existing_root_folder: >-
      {{
        (sonarr_setup_root_folders_response.json
        | selectattr('path', 'equalto', sonarr_root_folder.path)
        | list
        | first)
        | default({})
      }}

- name: Create Sonarr root folder when missing
  ansible.builtin.uri:
    url: "{{ sonarr_setup_api_url }}/api/v3/rootfolder"
    method: POST
    headers:
      X-Api-Key: "{{ sonarr_setup_resolved_api_key }}"
    validate_certs: "{{ sonarr_setup_api_validate_certs }}"
    body_format: json
    body:
      path: "{{ sonarr_root_folder.path }}"
    status_code: 201
  when: sonarr_setup_existing_root_folder.id is not defined
