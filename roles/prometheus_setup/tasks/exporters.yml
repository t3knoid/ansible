---
- name: Check for existing Prometheus configuration file
  ansible.builtin.stat:
    path: "{{ prometheus_setup_config_file }}"
  register: prometheus_setup_config_stat

- name: Read existing Prometheus configuration file
  ansible.builtin.slurp:
    src: "{{ prometheus_setup_config_file }}"
  register: prometheus_setup_existing_config
  when: prometheus_setup_config_stat.stat.exists

- name: Load existing Prometheus scrape configs
  ansible.builtin.set_fact:
    prometheus_setup_existing_scrape_configs: "{{ ((prometheus_setup_existing_config.content | b64decode | from_yaml).scrape_configs | default([])) if prometheus_setup_config_stat.stat.exists else [] }}"

- name: Load existing node exporter scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_node_static_configs: "{{ prometheus_setup_existing_scrape_configs | selectattr('job_name', 'equalto', 'node') | map(attribute='static_configs') | first | default([]) }}"

- name: Load existing nginx exporter scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_nginx_exporter_static_configs: "{{ prometheus_setup_existing_scrape_configs | selectattr('job_name', 'equalto', 'nginx_exporter') | map(attribute='static_configs') | first | default([]) }}"

- name: Load existing blackbox scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_blackbox_static_configs: "{{ prometheus_setup_existing_scrape_configs | selectattr('job_name', 'equalto', prometheus_setup_blackbox_job_name) | map(attribute='static_configs') | first | default([]) }}"

- name: Initialize node exporter target map
  ansible.builtin.set_fact:
    prometheus_setup_node_static_config_map: {}

- name: Seed node exporter target map from existing Prometheus config
  ansible.builtin.set_fact:
    prometheus_setup_node_static_config_map: "{{ prometheus_setup_node_static_config_map | combine({item.labels.instance: item}) }}"
  loop: "{{ prometheus_setup_node_static_configs }}"

- name: Merge current inventory node exporter targets into target map
  ansible.builtin.set_fact:
    prometheus_setup_node_static_config_map: "{{ prometheus_setup_node_static_config_map | combine({item: {'targets': [global_ip_addresses[item] ~ ':' ~ (hostvars[item].node_exporter_port | string)], 'labels': {'instance': item, 'group': item | regex_replace('-[0-9]+$', '')}}}) }}"
  loop: "{{ groups['node_exporter'] | default([]) }}"

- name: Build merged node exporter scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_node_static_configs: "{{ prometheus_setup_node_static_config_map.values() | list }}"

- name: Initialize nginx exporter target map
  ansible.builtin.set_fact:
    prometheus_setup_nginx_exporter_static_config_map: {}

- name: Seed nginx exporter target map from existing Prometheus config
  ansible.builtin.set_fact:
    prometheus_setup_nginx_exporter_static_config_map: "{{ prometheus_setup_nginx_exporter_static_config_map | combine({item.labels.instance: item}) }}"
  loop: "{{ prometheus_setup_nginx_exporter_static_configs }}"

- name: Merge current inventory nginx exporter targets into target map
  ansible.builtin.set_fact:
    prometheus_setup_nginx_exporter_static_config_map: "{{ prometheus_setup_nginx_exporter_static_config_map | combine({item: {'targets': [global_ip_addresses[item] ~ ':' ~ (hostvars[item].nginx_prometheus_exporter_port | string)], 'labels': {'instance': item, 'group': item | regex_replace('-[0-9]+$', '')}}}) }}"
  loop: "{{ groups['nginx_exporter'] | default([]) }}"

- name: Build merged nginx exporter scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_nginx_exporter_static_configs: "{{ prometheus_setup_nginx_exporter_static_config_map.values() | list }}"

- name: Initialize blackbox target map
  ansible.builtin.set_fact:
    prometheus_setup_blackbox_static_config_map: {}

- name: Seed blackbox target map from existing Prometheus config
  ansible.builtin.set_fact:
    prometheus_setup_blackbox_static_config_map: "{{ prometheus_setup_blackbox_static_config_map | combine({(item.targets | first): item}) }}"
  loop: "{{ prometheus_setup_blackbox_static_configs }}"

- name: Merge current inventory blackbox targets into target map
  ansible.builtin.set_fact:
    prometheus_setup_blackbox_static_config_map: >-
      {{
        prometheus_setup_blackbox_static_config_map | combine(
          {
            item.target: {
              'targets': [item.target],
              'labels': {
                'instance': item.instance | default(item.target),
                'group': item.group | default(prometheus_setup_blackbox_group_label)
              }
            }
          }
        )
      }}
  loop: "{{ prometheus_setup_blackbox_targets }}"

- name: Build merged blackbox scrape targets
  ansible.builtin.set_fact:
    prometheus_setup_blackbox_static_configs: "{{ prometheus_setup_blackbox_static_config_map.values() | list }}"

- name: Copy Prometheus configuration file
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_setup_config_file }}"
    owner: root
    group: root
    mode: "{{ prometheus_setup_config_mode }}"
    backup: true
  notify:
    - Reload Prometheus configuration
