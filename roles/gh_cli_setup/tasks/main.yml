---
- name: Install wget
  ansible.builtin.apt:
    name: wget
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download GitHub CLI GPG key
  ansible.builtin.get_url:
    url: "{{ gh_cli_setup_keyring_url }}"
    dest: "{{ gh_cli_setup_keyring_path }}"
    mode: "0644"

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }} signed-by={{ gh_cli_setup_keyring_path }}] {{ gh_cli_setup_repo_url }} stable main"
    filename: github-cli
    state: present

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
