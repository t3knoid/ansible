---
- name: Find existing deadsnakes apt source files
  ansible.builtin.shell: |
    find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name '*.list' -o -name '*.sources' \) \
      -exec grep -lE 'ppa\.launchpadcontent\.net/deadsnakes/ppa/ubuntu|ppa:deadsnakes/ppa' {} +
  register: python3_deadsnakes_source_files
  changed_when: false
  failed_when: false

- name: Remove existing deadsnakes apt source files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ python3_deadsnakes_source_files.stdout_lines }}"
  when: python3_deadsnakes_source_files.stdout_lines | length > 0

- name: Add deadsnakes apt repository key.
  ansible.builtin.get_url:
    url: "{{ python3_repo_key_url }}"
    dest: "{{ python3_repo_key_local }}"
    mode: "0644"
    force: true

- name: Remove deadsnakes apt repository
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: absent

- name: Add deadsnakes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by={{ python3_repo_key_local }}] {{ python3_repo_base_url }} noble main"
    filename: deadsnakes-ubuntu-ppa-noble
    mode: "0644"
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install python3
  ansible.builtin.apt:
    package: "python{{ python3_version }}"
    autoremove: true

- name: Register requested Python version as an alternative
  community.general.alternatives:
    name: python3
    path: "/usr/bin/python{{ python3_version }}"
    link: /usr/bin/python3
    priority: 100
    state: present
