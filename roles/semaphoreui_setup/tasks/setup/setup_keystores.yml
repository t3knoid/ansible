---

# Sets up keystores in Semaphore UI
# This should not be called directly, only via setup_project.yml

- name: Parse existing key store names
  ansible.builtin.set_fact:
    retrieved_key_names: >-
      {{
        retrieved_keys | map(attribute='name') | list
      }}

- name: Update existing key stores in project {{ current_project_name }}
  ansible.builtin.uri:
    url: "{{ semaphoreui_setup_api_base }}/project/{{ current_project_id }}/keys/{{
      existing_key.id }}"
    method: PUT
    headers:
      Content-Type: application/json
      Accept: application/json
      Authorization: "Bearer {{ semaphoreui_setup_api_token }}"
    body_format: json
    body: >-
      {{
        key_to_add
        | combine({
            'id': (existing_key.id | int),
            'project_id': (current_project_id | int)
          })
      }}
    status_code: 204
  vars:
    existing_key: "{{ (retrieved_keys | selectattr('name', 'equalto',
      key_to_add.name) | list | first) }}"
    existing_key_login: "{{ (((existing_key.login_password | default({})).login) |
      default('')) if existing_key.type == key_to_add.type else '' }}"
    desired_key_login: "{{ (key_to_add.login_password.login | default('')) if
      key_to_add.type == 'login_password' else '' }}"
  when:
    - key_to_add.name in retrieved_key_names
    - existing_key.type != key_to_add.type or existing_key_login !=
      desired_key_login
  loop: "{{ project_data_to_add.keystores }}"
  loop_control:
    label: "{{ key_to_add.name }}"
    loop_var: key_to_add

- name: Create key stores in project {{ current_project_name }}
  ansible.builtin.uri:
    url: "{{ semaphoreui_setup_api_base }}/project/{{ current_project_id }}/keys"
    method: POST
    headers:
      Content-Type: application/json
      Accept: application/json
      Authorization: "Bearer {{ semaphoreui_setup_api_token }}"
    body_format: json
    body: >-
      {{
        key_to_add | combine({ 'project_id': (current_project_id | int) })
      }}
    status_code: 201
  when: key_to_add.name not in retrieved_key_names
  loop: "{{ project_data_to_add.keystores }}"
  loop_control:
    label: "{{ key_to_add.name }}"
    loop_var: key_to_add
