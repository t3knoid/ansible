---
# - name: Include nginx variables
#   ansible.builtin.include_vars:
#     dir: ../../../roles/nginx_setup/defaults/main

- name: Ensure nginx snippets directory exists
  ansible.builtin.file:
    path: "{{ nginx_setup_homedir }}/snippets"
    state: directory
    mode: "0755"
  when:
    - inventory_hostname in groups['rproxy_main']
    - rproxy_setup_cloudflare_only
  tags: rproxy_setup_cloudflare

- name: Deploy Cloudflare IPv4 allowlist snippet
  ansible.builtin.template:
    src: cloudflare-allow.conf.j2
    dest: "{{ nginx_setup_homedir }}/snippets/cloudflare-allow.conf"
    mode: "0644"
  when:
    - inventory_hostname in groups['rproxy_main']
    - rproxy_setup_cloudflare_only
  notify: Restart nginx
  tags: rproxy_setup_cloudflare

- name: Deploy Cloudflare IPv6 allowlist snippet
  ansible.builtin.template:
    src: cloudflare-allow-ipv6.conf.j2
    dest: "{{ nginx_setup_homedir }}/snippets/cloudflare-allow-ipv6.conf"
    mode: "0644"
  when:
    - inventory_hostname in groups['rproxy_main']
    - rproxy_setup_cloudflare_only
  notify: Restart nginx
  tags: rproxy_setup_cloudflare

- name: Remove Cloudflare IPv4 allowlist snippet when disabled
  ansible.builtin.file:
    path: "{{ nginx_setup_homedir }}/snippets/cloudflare-allow.conf"
    state: absent
  when:
    - inventory_hostname in groups['rproxy_main']
    - not rproxy_setup_cloudflare_only
  notify: Restart nginx
  tags: rproxy_setup_cloudflare

- name: Remove Cloudflare IPv6 allowlist snippet when disabled
  ansible.builtin.file:
    path: "{{ nginx_setup_homedir }}/snippets/cloudflare-allow-ipv6.conf"
    state: absent
  when:
    - inventory_hostname in groups['rproxy_main']
    - not rproxy_setup_cloudflare_only
  notify: Restart nginx
  tags: rproxy_setup_cloudflare

- name: Create or update Nginx site configuration
  ansible.builtin.template:
    src: site.conf.j2
    dest: "{{ nginx_setup_homedir }}/sites-available/{{ rproxy_setup_site.server_name }}.conf"
    mode: "0644"
  loop: "{{ rproxy_setup_sites }}"
  loop_control:
    label: "{{ rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_site
  notify: Restart nginx
  tags: rproxy_setup_sites

- name: Enable Nginx site configuration
  ansible.builtin.file:
    src: "{{ nginx_setup_homedir }}/sites-available/{{ rproxy_setup_site.server_name }}.conf"
    dest: "{{ nginx_setup_homedir }}/sites-enabled/{{ rproxy_setup_site.server_name }}.conf"
    state: link
    force: true
  loop: "{{ rproxy_setup_sites }}"
  when: (rproxy_setup_site.enable is defined) and (rproxy_setup_site.enable == true)
  loop_control:
    label: "{{ rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_site
  notify: Restart nginx
  tags: rproxy_setup_sites

- name: Disable Nginx site configuration if not set to enable
  ansible.builtin.file:
    path: "{{ nginx_setup_homedir }}/sites-enabled/{{ rproxy_setup_site.server_name }}.conf"
    state: absent
    force: true
  loop: "{{ rproxy_setup_sites }}"
  when: (rproxy_setup_site.enable is not defined) or (rproxy_setup_site.enable == false)
  loop_control:
    label: "{{ rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_site
  notify: Restart nginx
  tags: rproxy_setup_sites

- name: Ensure certificate host folders exist
  ansible.builtin.file:
    path: "{{ nginx_setup_certroot }}/{{ rproxy_setup_site.server_name }}"
    state: directory
    mode: "0644"
  loop: "{{ rproxy_setup_sites }}"
  loop_control:
    label: "{{ rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_site
  tags: rproxy_setup_certs

- name: Check if certificate is present
  ansible.builtin.stat:
    path: "{{ nginx_setup_certroot }}/{{ rproxy_setup_site.server_name }}/fullchain.pem"
  register: rproxy_setup_cert_pem
  loop: "{{ rproxy_setup_sites }}"
  loop_control:
    label: "{{ rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_site
  tags: rproxy_setup_certs

- name: Create private keys
  community.crypto.openssl_privatekey:
    path: "{{ nginx_setup_certroot }}/{{ rproxy_setup_cert.rproxy_setup_site.server_name }}/privkey.pem"
    size: 2048
    state: present
  loop: "{{ rproxy_setup_cert_pem.results }}"
  when: not rproxy_setup_cert.stat.exists
  loop_control:
    label: "{{ rproxy_setup_cert.rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_cert
  tags: rproxy_setup_certs

- name: Create self-signed certificates
  community.crypto.x509_certificate:
    path: "{{ nginx_setup_certroot }}/{{ rproxy_setup_cert.rproxy_setup_site.server_name }}/fullchain.pem"
    privatekey_path: "{{ nginx_setup_certroot }}/{{ rproxy_setup_cert.rproxy_setup_site.server_name }}/privkey.pem"
    provider: selfsigned
  loop: "{{ rproxy_setup_cert_pem.results }}"
  when: not rproxy_setup_cert.stat.exists
  loop_control:
    label: "{{ rproxy_setup_cert.rproxy_setup_site.server_name }}"
    loop_var: rproxy_setup_cert
  notify: Restart nginx
  tags: rproxy_setup_certs
