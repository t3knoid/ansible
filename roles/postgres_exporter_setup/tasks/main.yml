---
- name: Require postgres_exporter database password or explicit data source name
  ansible.builtin.assert:
    that:
      - postgres_exporter_setup_data_source_name | length > 0 or postgres_exporter_setup_db_password | length > 0
    fail_msg: "Set postgres_exporter_setup_db_password or override postgres_exporter_setup_data_source_name from inventory or vault before deploying postgres_exporter."

- name: Build effective postgres_exporter data source name
  ansible.builtin.set_fact:
    postgres_exporter_setup_effective_data_source_name: >-
      {{
        postgres_exporter_setup_data_source_name
        if postgres_exporter_setup_data_source_name | length > 0
        else 'postgresql://'
          ~ postgres_exporter_setup_db_username
          ~ ':'
          ~ postgres_exporter_setup_db_password
          ~ '@'
          ~ postgres_exporter_setup_db_host
          ~ ':'
          ~ (postgres_exporter_setup_db_port | string)
          ~ '/'
          ~ postgres_exporter_setup_db_name
          ~ '?sslmode='
          ~ postgres_exporter_setup_sslmode
      }}

- name: Create postgres_exporter group
  ansible.builtin.group:
    name: "{{ postgres_exporter_setup_group }}"
    system: true

- name: Create postgres_exporter user
  ansible.builtin.user:
    name: "{{ postgres_exporter_setup_user }}"
    group: "{{ postgres_exporter_setup_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Ensure postgres_exporter database role exists
  community.postgresql.postgresql_user:
    login_unix_socket: "{{ postgres_exporter_setup_login_unix_socket }}"
    login_user: "{{ postgres_exporter_setup_admin_username }}"
    login_db: "{{ postgres_exporter_setup_admin_database }}"
    login_port: "{{ postgres_exporter_setup_db_port }}"
    name: "{{ postgres_exporter_setup_db_username }}"
    password: "{{ postgres_exporter_setup_db_password }}"
    role_attr_flags: "{{ postgres_exporter_setup_db_role_flags }}"
    state: present
  become: true
  become_user: postgres
  no_log: true
  when: postgres_exporter_setup_manage_db_user

- name: Grant pg_monitor role to postgres_exporter database role
  community.postgresql.postgresql_membership:
    login_unix_socket: "{{ postgres_exporter_setup_login_unix_socket }}"
    login_user: "{{ postgres_exporter_setup_admin_username }}"
    login_db: "{{ postgres_exporter_setup_admin_database }}"
    login_port: "{{ postgres_exporter_setup_db_port }}"
    group: pg_monitor
    target_roles:
      - "{{ postgres_exporter_setup_db_username }}"
    state: present
  become: true
  become_user: postgres
  no_log: true
  when:
    - postgres_exporter_setup_manage_db_user
    - postgres_exporter_setup_db_grant_monitor_role

- name: Download and extract postgres_exporter
  ansible.builtin.unarchive:
    src: "{{ postgres_exporter_setup_download_url }}"
    dest: /opt/
    remote_src: true
    creates: "{{ postgres_exporter_setup_install_dir }}"
    mode: "0755"

- name: Create symlink for postgres_exporter
  ansible.builtin.file:
    src: "{{ postgres_exporter_setup_install_dir }}"
    dest: "{{ postgres_exporter_setup_home }}"
    state: link
    force: true

- name: Set ownership for postgres_exporter directory
  ansible.builtin.file:
    path: "{{ postgres_exporter_setup_install_dir }}"
    owner: "{{ postgres_exporter_setup_user }}"
    group: "{{ postgres_exporter_setup_group }}"
    recurse: true

- name: Copy postgres_exporter binary to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ postgres_exporter_setup_home }}/postgres_exporter"
    dest: "{{ postgres_exporter_setup_binary }}"
    owner: "{{ postgres_exporter_setup_user }}"
    group: "{{ postgres_exporter_setup_group }}"
    mode: "{{ postgres_exporter_setup_mode }}"
    remote_src: true
  notify:
    - Restart postgres_exporter service

- name: Create postgres_exporter configuration directory
  ansible.builtin.file:
    path: "{{ postgres_exporter_setup_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render postgres_exporter environment file
  ansible.builtin.template:
    src: postgres_exporter.env.j2
    dest: "{{ postgres_exporter_setup_env_file }}"
    owner: root
    group: root
    mode: "0600"
  notify:
    - Restart postgres_exporter service

- name: Create postgres_exporter systemd service file
  ansible.builtin.template:
    src: postgres_exporter.service.j2
    dest: "{{ postgres_exporter_setup_service_file }}"
    owner: root
    group: root
    mode: "{{ postgres_exporter_setup_service_mode }}"
  notify:
    - Reload systemd daemon
    - Restart postgres_exporter service

- name: Enable and start postgres_exporter service
  ansible.builtin.systemd:
    name: "{{ postgres_exporter_setup_service_name }}"
    enabled: true
    state: started