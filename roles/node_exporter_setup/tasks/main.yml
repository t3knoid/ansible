---
- name: Create Node Exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_setup_group }}"
    state: present
    system: true

- name: Create Node Exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_setup_user }}"
    group: "{{ node_exporter_setup_group }}"
    shell: /sbin/nologin
    state: present
    system: true
    createhome: false

- name: Download and Extract Node Exporter
  ansible.builtin.unarchive:
    src: >
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_setup_version }}/node_exporter-{{ node_exporter_setup_version }}.linux-amd64.tar.gz
    dest: /opt/
    remote_src: true
    creates: "/opt/node_exporter-{{ node_exporter_setup_version }}.linux-amd64"
    mode: "0755"

- name: Create symlink for Node Exporter
  ansible.builtin.file:
    src: "/opt/node_exporter-{{ node_exporter_setup_version }}.linux-amd64"
    dest: "{{ node_exporter_setup_home }}"
    state: link
    force: true

- name: Set ownership for Node Exporter directory
  ansible.builtin.file:
    path: "/opt/node_exporter-{{ node_exporter_setup_version }}.linux-amd64"
    owner: "{{ node_exporter_setup_user }}"
    group: "{{ node_exporter_setup_group }}"
    recurse: true

- name: Copy Node Exporter binary to /usr/local/bin
  ansible.builtin.copy:
    src: /opt/node_exporter-{{ node_exporter_setup_version }}.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    owner: "{{ node_exporter_setup_user }}"
    group: "{{ node_exporter_setup_group }}"
    mode: "{{ node_exporter_setup_mode }}"
    remote_src: true

- name: Create Node Exporter textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_setup_textfile_collector_dir }}"
    state: directory
    owner: root
    group: "{{ node_exporter_setup_group }}"
    mode: "0775"

- name: Install Linux updates metrics script for Ubuntu
  ansible.builtin.template:
    src: check_updates.sh.j2
    dest: "{{ node_exporter_setup_linux_updates_script_path }}"
    owner: root
    group: root
    mode: "0755"
  when: ansible_distribution == 'Ubuntu'

- name: Seed Linux updates metrics file for Ubuntu
  ansible.builtin.shell: |
    set -euo pipefail
    tmp_file="$(mktemp)"
    {{ node_exporter_setup_linux_updates_script_path }} > "$tmp_file"
    install -o root -g {{ node_exporter_setup_group }} -m 0644 "$tmp_file" "{{ node_exporter_setup_linux_updates_metrics_path }}"
    rm -f "$tmp_file"
  args:
    executable: /bin/bash
  changed_when: true
  when: ansible_distribution == 'Ubuntu'

- name: Schedule Linux updates metrics cron job for Ubuntu
  ansible.builtin.cron:
    name: node_exporter_linux_updates_metrics
    minute: "{{ node_exporter_setup_linux_updates_cron_minute }}"
    user: root
    job: >-
      /bin/bash -c 'set -euo pipefail;
      tmp_file="$(mktemp)";
      {{ node_exporter_setup_linux_updates_script_path }} > "$tmp_file";
      install -o root -g {{ node_exporter_setup_group }} -m 0644 "$tmp_file" {{ node_exporter_setup_linux_updates_metrics_path }};
      rm -f "$tmp_file"'
  when: ansible_distribution == 'Ubuntu'

- name: Create Node Exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd and restart node_exporter

- name: Enable Node Exporter service
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    daemon_reload: true

- name: Start Node Exporter service
  ansible.builtin.systemd:
    name: node_exporter
    state: started
