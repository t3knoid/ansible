---

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ ecube_setup_backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'

- name: Backup PostgreSQL database using pg_dump
  ansible.builtin.shell: |
    set -euo pipefail
    pg_bin="/usr/lib/postgresql/{{ postgresql_setup_version }}/bin"
    "$pg_bin/pg_dump" -U {{ ecube_setup_db_user }} -h {{ ecube_setup_pg_host }} -Fc \
      --file={{ ecube_setup_backup_path }} {{ ecube_setup_db_name }}
  args:
    executable: /bin/bash
  become_user: postgres
  register: pg_backup_result
  failed_when: pg_backup_result.rc != 0
  changed_when: true

- name: Keep only the latest 3 backups
  ansible.builtin.shell: |
    ls -1t {{ ecube_setup_backup_dir }}/{{ ecube_setup_backup_prefix }}*.sqlc | tail -n +4 | xargs -r rm -f
  args:
    executable: /bin/bash
  become: true
  become_user: postgres
