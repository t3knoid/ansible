---

vms_config:
  agent: "1"
  cores: "2"
  cpu: host
  memory: 2048
  ostype: l26
  scsihw: cephfs_storage
  sockets: 1
  storage: cephfs_storage
  disk_os:
    disk: virtio0
    backup: true
    size: 20
    storage: cephfs_storage
  disk2:
    disk: virtio1
    backup: true
    size: 30
    storage: cephfs_storage

vms_os: ubuntu_24_server
vms_autoinstall: true
vms_enable_serial_terminal: false
vms_additional_packages: []
python3_version: 3.12

disks_disk_mounts:
  - { mountpoint: "/data", mountpoint_owner: "{{ users_list[0].username }}", mountpoint_group: "{{ users_list[0].username }}" }

node_exporter_port: 9200
nginx_prometheus_exporter_port: 9113
postgres_exporter_port: 9187
postgres_exporter_setup_db_username: "postgres_exporter"
postgres_exporter_setup_db_name: "postgres"
postgres_exporter_setup_db_host: "127.0.0.1"
postgres_exporter_setup_db_port: 5432
postgres_exporter_setup_sslmode: "disable"
# Set postgres_exporter_setup_db_password and postgres_exporter_setup_admin_password via vault.
