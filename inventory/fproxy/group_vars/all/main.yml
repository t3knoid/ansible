---
vms_config:
  agent: "1"
  cores: "2"
  cpu: host
  memory: 1024
  ostype: l26
  scsihw: virtio-scsi-single
  sockets: 1
  storage: local
  disk_os:
    disk: virtio0
    backup: true
    size: 20
    storage: local

vms_os: ubuntu_24_server
vms_autoinstall: true
vms_enable_serial_terminal: false
vms_additional_packages: []
python3_version: 3.12
python3_venv_folder: "/opt/python_{{ python3_version }}"

# Explicit Tinyproxy client allow-list for the forward proxy deployment.
tinyproxy_setup_allowed_clients:
  - "192.168.0.0/24"
  - "192.168.2.0/24"

# Future integration switch for the OpenVPN role.
tinyproxy_setup_use_vpn: false
