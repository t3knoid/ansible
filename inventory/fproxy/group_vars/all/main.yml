---
vms_config:
  agent: "1"
  cores: "2"
  cpu: host
  memory: 1024
  ostype: l26
  scsihw: virtio-scsi-single
  sockets: 1
  storage: local
  disk_os:
    disk: virtio0
    backup: true
    size: 20
    storage: local

vms_os: ubuntu_24_server
vms_autoinstall: true
vms_enable_serial_terminal: false
vms_additional_packages: []
python3_version: 3.12
python3_venv_folder: "/opt/python_{{ python3_version }}"

# Explicit Tinyproxy client allow-list for the forward proxy deployment.
tinyproxy_setup_allowed_clients:
  - "192.168.0.0/24"
  - "192.168.2.0/24"

openvpn_enabled: false
openvpn_setup_remote_server: ""
openvpn_setup_remote_port: 1194
openvpn_setup_remote_protocol: udp
openvpn_setup_dns_servers: []
# Store VPN credentials and the provider CA certificate in inventory vault or
# inject them at runtime with OPENVPN_SETUP_AUTH_USERNAME,
# OPENVPN_SETUP_AUTH_PASSWORD, and openvpn_setup_ca_cert.
