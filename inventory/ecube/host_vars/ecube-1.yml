---

vms_config:
  agent: "1"
  cores: "2"
  cpu: host
  memory: 8192
  ostype: l26
  scsihw: local
  sockets: 1
  storage: local
  disk_os:
    disk: virtio0
    backup: true
    size: 20
    storage: local
  network:
    nic0:
      model: virtio
      bridge: vmbr0
      tag: 90

global_gateway: 192.168.90.1

ecube_setup_trust_proxy_headers: false
ecube_setup_demo: true
ecube_setup_no_tls: true
