---
vms_config:
  agent: "1"
  cores: "2"
  cpu: host
  memory: 2048
  ostype: l26
  scsihw: local
  sockets: 1
  storage: local
  disk_os:
    disk: virtio0
    backup: true
    size: 20
    storage: local
  disk2:
    disk: virtio1
    backup: true
    size: 50
    storage: local
  network:
    nic0:
      model: virtio
      bridge: vmbr0
      tag: 20

vms_os: ubuntu_24_server
vms_autoinstall: true
vms_enable_serial_terminal: false
vms_additional_packages: []
python3_version: 3.12

# users_list is expected to be defined in the vault with
# the first user in the list is expected to define the
# Loki user and groups attributes.
loki_user_entry: "{{ users_list | selectattr('username', 'equalto', 'loki') | first }}"
loki_setup_user: "{{ loki_user_entry.username }}"
loki_setup_group: "{{ loki_user_entry.username }}"
loki_setup_groups: "{{ loki_user_entry.groups | default([loki_user_entry.username]) }}"

disks_disk_mounts:
  - { mountpoint: "/loki", mountpoint_owner: "{{ loki_setup_user }}", mountpoint_group: "{{ loki_setup_groups[0] }}" }
