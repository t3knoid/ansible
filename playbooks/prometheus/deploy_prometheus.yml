---
# Purpose: Deploy Prometheus monitoring system
# Usage: ansible-playbook -i inventory/prometheus/inventory.ini playbooks/prometheus/deploy_prometheus.yml
# Use playbooks/prometheus/deploy_prometheus_exporters.yml to refresh exporter scrape targets.

- name: Deploys Prometheus and AlertManager
  hosts: prometheus
  become: true
  gather_facts: true
  roles:
    - global
    - users
    - autofs
    - prometheus_setup
    - alertmanager_setup
