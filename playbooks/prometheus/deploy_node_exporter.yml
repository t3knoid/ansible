---
# Purpose: Deploy Node Exporter on node_exporter hosts
# Note: This playbook only installs or updates node_exporter on the selected inventory's node_exporter hosts.
# It does not update Prometheus scrape targets.

- name: Deploy Node Exporter
  hosts: node_exporter
  become: true
  gather_facts: false
  roles:
    - global
    - node_exporter_setup
