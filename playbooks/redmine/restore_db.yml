---

# Purpose: Restore Redmine PostgreSQL database from backup.

- name: Stop Redmine before restoring the database
  hosts: redmine
  become: true
  gather_facts: true
  roles:
    - global

  tasks:
    - name: Stop Apache2 service
      ansible.builtin.service:
        name: apache2
        state: stopped

- name: Restore Redmine database on PostgreSQL host
  hosts: pgdb
  become: true
  gather_facts: true
  roles:
    - global

  tasks:
    - name: Import database_restore.yml from redmine_setup role
      ansible.builtin.import_role:
        name: redmine_setup
        tasks_from: database_restore.yml

- name: Start Redmine after restoring the database
  hosts: redmine
  become: true
  gather_facts: true
  roles:
    - global

  tasks:
    - name: Start Apache2 Service
      ansible.builtin.service:
        name: apache2
        state: started
