---
# Purpose: Configure Windows client hosts to use the forward proxy for machine
# environment variables plus WinINet and WinHTTP proxy settings.
# Targets should be members of the tinyproxy_client group and should not also be
# members of the linux group.
# Override tinyproxy_client_proxy_host when the first host in the fproxy group is not
# the correct reachable address for clients.

- name: Configure Windows hosts to use the forward proxy
  hosts: tinyproxy_client:!linux
  become: true
  become_method: ansible.builtin.runas
  become_user: "{{ ansible_user }}"
  gather_facts: true
  pre_tasks:
    - name: Validate Windows client targets
      ansible.builtin.assert:
        that:
          - ansible_os_family == 'Windows'
        fail_msg: >-
          This playbook only supports Windows hosts. Use configure_fproxy_client.yml
          for Linux targets.
  roles:
    - role: tinyproxy_client
