---
# Purpose: Deploy the IPsec VPN Docker service on VPN hosts.

- name: Deploy IPsec VPN server
  hosts: vpn
  become: true
  gather_facts: false
  pre_tasks:
    - name: Gather minimal facts for VPN host prerequisites
      ansible.builtin.setup:
        gather_subset:
          - min

    - name: Check for matching Ubuntu linux-modules-extra package
      ansible.builtin.command: "apt-cache show linux-modules-extra-{{ ansible_kernel }}"
      register: vpn_linux_modules_extra_check
      changed_when: false
      failed_when: false
      when: ansible_distribution == 'Ubuntu'

    - name: Install matching Ubuntu linux-modules-extra package
      ansible.builtin.apt:
        name: "linux-modules-extra-{{ ansible_kernel }}"
        state: present
        update_cache: true
      when:
        - ansible_distribution == 'Ubuntu'
        - vpn_linux_modules_extra_check.rc == 0
  roles:
    - global
    - users
    - docker_setup
    - ipsec_vpn_server_setup
